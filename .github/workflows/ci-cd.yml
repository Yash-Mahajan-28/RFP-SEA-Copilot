name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Use the LTS version of Node
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci # Uses package-lock.json for clean, deterministic installs

    - name: Build Next.js Application
      run: npm run build
      
    # If in the future you add Jest or other unit testing frameworks, 
    # you can uncomment the line below to run tests automatically:
    # - name: Run Tests
    #   run: npm test
